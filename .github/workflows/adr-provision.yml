name: ADR Provision + Sync (label)

# When a PR is labeled 'sync-to-confluence' (ADR-0007):
#   1. PROVISION always — create the Confluence page (if absent) and record
#      concept -> page in the space-property map. Idempotent (self-guards on map).
#   2. SYNC only if the PR is MERGED — push content from main. Never syncs
#      unmerged content (open-PR content isn't in main yet). Idempotent
#      (self-guards on section hashes; unchanged content = no write).
#
# Timing cases handled:
#   - Label open PR  -> provision now; sync happens later on merge (push-sync).
#   - Label merged PR -> provision + sync together (recovery / late label).
#   - Re-label       -> re-runs; writes only if content actually changed.

on:
  pull_request:
    types: [labeled]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: adr-provision-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  provision-and-sync:
    if: github.event.label.name == 'sync-to-confluence'
    runs-on: ubuntu-latest
    env:
      CONFLUENCE_BASE_URL: ${{ vars.CONFLUENCE_BASE_URL }}
      CONFLUENCE_SPACE_KEY: ${{ vars.CONFLUENCE_SPACE_KEY }}
      CONFLUENCE_PARENT_ID: ${{ vars.CONFLUENCE_PARENT_ID }}
      CONFLUENCE_USER: ${{ secrets.CONFLUENCE_USER }}
      CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
    steps:
      - name: Checkout PR head (to detect the PR's ADR paths)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0        # full history: need base, head, and main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tooling/requirements.txt
          sudo apt-get update && sudo apt-get install -y pandoc

      - name: Determine changed ADR paths in this PR
        id: changed
        run: |
          base='${{ github.event.pull_request.base.sha }}'
          head='${{ github.event.pull_request.head.sha }}'
          paths=$(git diff --name-only "$base" "$head" -- 'cross-boundary/**.md' | tr '\n' ' ')
          echo "paths=$paths" >> "$GITHUB_OUTPUT"
          echo "Changed ADR paths: $paths"

      - name: Provision Confluence pages (always)
        id: provision
        if: steps.changed.outputs.paths != ''
        working-directory: tooling
        run: |
          OUT=$(python -m adr_sync.provision --bundle-root .. --paths ${{ steps.changed.outputs.paths }})
          echo "$OUT"
          {
            echo "result<<EOFMARK"
            echo "$OUT"
            echo "EOFMARK"
          } >> "$GITHUB_OUTPUT"

      # ---- SYNC: only when the PR is merged (content is in main) ----

      - name: Check out main for sync
        if: github.event.pull_request.merged == true && steps.changed.outputs.paths != ''
        run: |
          git checkout main
          git pull --ff-only origin main || true

      - name: Sync content to Confluence (merged PRs only)
        id: sync
        if: github.event.pull_request.merged == true && steps.changed.outputs.paths != ''
        working-directory: tooling
        run: |
          # Diff main against its previous commit to scope the sync to what merged.
          # The label may fire well after merge, so fall back to syncing the PR's
          # specific ADR paths via a targeted range: use the merge base..main.
          BASE="${{ github.event.pull_request.base.sha }}"
          OUT=$(python -m adr_sync.sync --bundle-root .. --base-ref "$BASE" --head-ref HEAD)
          echo "$OUT"
          {
            echo "result<<EOFMARK"
            echo "$OUT"
            echo "EOFMARK"
          } >> "$GITHUB_OUTPUT"

      - name: Comment result on PR
        if: steps.changed.outputs.paths != ''
        uses: actions/github-script@v7
        with:
          script: |
            const provision = `${{ steps.provision.outputs.result }}` || '(none)';
            const merged = ${{ github.event.pull_request.merged }};
            const sync = `${{ steps.sync.outputs.result }}` || '';
            const disabled = provision.includes('globally disabled') || sync.includes('globally disabled');

            let body;
            if (disabled) {
              body = "⚠️ **Confluence is currently disabled** (`CONFLUENCE_ENABLED=false`).\n"
                   + "The page was **not** provisioned or synced. Re-apply the label after enabling.\n\n"
                   + "```\n" + provision + (sync ? "\n" + sync : "") + "\n```";
            } else {
              body = "✅ **Confluence provisioning complete**\n\n```\n" + provision + "\n```\n";
              if (merged) {
                body += "\n**Sync (merged PR):**\n```\n" + (sync || '(no sync output)') + "\n```";
              } else {
                body += "\nPR is still open — page provisioned; content will sync on merge.";
              }
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });