name: ADR Sync

# One-way sync of OKF-conformant ADRs to destination plugins (ADR-0003, ADR-0004).
# The pipeline is a CONSUMER: it never writes back to the repo. Sync telemetry
# lives only in this workflow's run logs (ADR-0003 decision #6).

on:
  push:
    branches: [main]
    paths:
      - 'cross-boundary/**.md'
      - 'repo-specific/**.md'
  # Manual runs let you exercise the pipeline in dry-run against any range.
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run without writing to destinations'
        type: boolean
        default: true

# No `permissions: contents: write` — the pipeline must not push to the repo.
permissions:
  contents: read

concurrency:
  # Serialize syncs so two runs don't race on the same destination page.
  group: adr-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with history for git diff)
        uses: actions/checkout@v4
        with:
          # Need at least the previous commit to diff against on push events.
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
          # pandoc is used by the Confluence plugin's markdown->storage conversion.
          sudo apt-get update && sudo apt-get install -y pandoc

      - name: Determine diff base
        id: base
        run: |
          # On push, diff against the commit before this push.
          # On manual dispatch, default to HEAD~1.
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "base_ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          else
            echo "base_ref=HEAD~1" >> "$GITHUB_OUTPUT"
          fi

      - name: Run sync
        env:
          CONFLUENCE_BASE_URL: ${{ vars.CONFLUENCE_BASE_URL }}
          CONFLUENCE_SPACE_KEY: ${{ vars.CONFLUENCE_SPACE_KEY }}
          CONFLUENCE_ENABLED: ${{ vars.CONFLUENCE_ENABLED }}
          CONFLUENCE_USER: ${{ secrets.CONFLUENCE_USER }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
        run: |
          # Pilot runs dry by default. Flip to a live run only after validation
          # (ADR-0003 next steps): set dry_run input to false via workflow_dispatch,
          # or remove --dry-run once the pilot is signed off.
          DRY_FLAG="--dry-run"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "false" ]; then
            DRY_FLAG=""
          fi

          python -m adr_sync.sync \
            --bundle-root . \
            --base-ref "${{ steps.base.outputs.base_ref }}" \
            --head-ref HEAD \
            $DRY_FLAG